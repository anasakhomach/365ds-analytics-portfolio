projects:
  - slug: real-estate-market-analysis
    title: Real Estate Market Analysis
    summary: Python-first market analysis with DuckDB medallion layers and Streamlit reporting.
    project_dir: projects/real-estate-market-analysis
    instruction_path: project-instructions/Real Estate Market Analysis with Python Project Instructions.md
    readme_path: projects/real-estate-market-analysis/README.md
    dashboard_path: projects/real-estate-market-analysis/dashboard/app.py
    warehouse_path: projects/real-estate-market-analysis/warehouse.duckdb
    docs:
      - projects/real-estate-market-analysis/docs/data_flow.md
      - projects/real-estate-market-analysis/docs/naming_conventions.md
    reports:
      - projects/real-estate-market-analysis/reports/real_estate_market_analysis_report.md
    gold_tables:
      - mart_age_intervals
      - mart_building_performance
      - mart_correlation_metrics
      - mart_country_performance
      - mart_monthly_revenue
      - mart_price_intervals
      - mart_property_transactions
      - mart_state_distribution
      - mart_summary_kpis
      - mart_yearly_sales_by_building
    starter_questions:
      - What business questions does the Real Estate project answer?
      - Which building generated the most revenue?
      - How is customer age calculated in the pipeline?

